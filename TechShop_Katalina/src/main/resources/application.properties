# Nombre de la aplicación
spring.application.name=techshop

# Para definir el puerto donde "escuchará" el servidor
server.port=8080

# Para definir el formato de despliegue de fecha/hora del log en la consola
logging.pattern.dateformat=hh:mm

# Para eliminar mensajes invasivos de Spring
spring.main.banner-mode=off

# En desarrollo el "cache" del servidor (false), en producción "true"
spring.thymeleaf.cache=false

# ========== CONEXIÓN AIVEN (COMENTADA POR SI LA NECESITAS) ==========
#spring.datasource.url=
#spring.datasource.username=
#spring.datasource.password=

# ========== CONEXIÓN LOCAL (ACTIVA) ==========
spring.datasource.url=jdbc:mysql://localhost:3306/techshop
spring.datasource.username=root
spring.datasource.password=

# Drivers de conexión y plataforma
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Configuración JPA / Hibernate adicional
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Mostrar información detallada en el log
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE