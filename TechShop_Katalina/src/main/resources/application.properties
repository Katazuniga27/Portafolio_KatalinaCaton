# Nombre de la aplicación
spring.application.name=techshop

# Para definir el puerto donde "escuchará" el servidor
server.port=8080

# Para definir el formato de despliegue de fecha/hora del log en la consola
logging.pattern.dateformat=hh:mm

# Para eliminar mensajes invasivos de Spring
spring.main.banner-mode=off

# En desarrollo el "cache" del servidor (false), en producción "true"
spring.thymeleaf.cache=false

spring.datasource.url=jdbc:mysql://localhost:3306/techshop
spring.datasource.username=root
spring.datasource.password=

# Drivers de conexión y plataforma
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Configuración JPA / Hibernate adicional
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Mostrar información detallada en el log
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

#Esta información se utiliza para obtener acceso a su storage
firebase.bucket.name=techshop-89115.firebasestorage.app
firebase.storage.path=techshop
firebase.json.path=firebase
firebase.json.file=techshop-89115-firebase-adminsdk-fbsvc-18f1dccb98.json